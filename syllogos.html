<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Μητρώο Αθλητικού Συλλόγου</title>
  <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
/* ═══════════════════════════════════════════════════════
   CSS DESIGN SYSTEM
   ═══════════════════════════════════════════════════════ */

/* ─── CSS Variables ─── */
:root {
  --primary:       #111111;
  --primary-light: #111111;
  --primary-dark:  #000000;
  --accent:        #ff3b30;
  --accent-light:  #ff6961;
  --success:       #28a745;
  --success-light: #d4edda;
  --danger:        #ff3b30;
  --danger-light:  #fde8e8;
  --warning:       #d68910;
  --warning-light: #fff3cd;
  --bg:            #fafafa;
  --surface:       #ffffff;
  --border:        #111111;
  --border-light:  #e0e0e0;
  --text:          #111111;
  --text-muted:    #888888;
  --text-light:    #aaaaaa;

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body:    'Inter Tight', -apple-system, sans-serif;
  --font-mono:    'JetBrains Mono', 'Courier New', monospace;

  --sidebar-width: 200px;
  --header-height: 0px;
  --radius:        0px;
  --radius-sm:     0px;
  --radius-lg:     0px;
  --shadow:        none;
  --shadow-md:     none;
  --shadow-lg:     none;
  --transition:    0.12s ease;
}

/* ─── Reset & Base ─── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── Typography ─── */
h1, h2, h3 {
  font-family: var(--font-display);
  font-weight: 400;
  font-style: italic;
  line-height: 1.2;
}

h1 { font-size: 1.75rem; }
h2 { font-size: 2.4rem; letter-spacing: -1px; }
h3 { font-size: 1.15rem; }

.money {
  font-family: var(--font-mono);
  font-weight: 700;
  text-align: right;
  white-space: nowrap;
}

/* ─── App Shell ─── */
#app {
  display: flex;
  min-height: 100vh;
}

/* ─── Sidebar ─── */
#sidebar {
  width: var(--sidebar-width);
  background: #111111;
  color: #ffffff;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.sidebar-header {
  padding: 32px 20px 28px;
  border-bottom: 1px solid #333;
  text-align: center;
}

.sidebar-header .club-logo {
  display: none;
}

.sidebar-header h1 {
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 900;
  font-style: normal;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  line-height: 1.5;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  overflow-y: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 20px;
  color: #666;
  text-decoration: none;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  border-left: 2px solid transparent;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}

.nav-item:hover {
  background: none;
  color: #bbb;
}

.nav-item.active {
  background: none;
  color: #fff;
  border-left-color: var(--accent);
}

.nav-item .nav-icon {
  font-size: 0.85rem;
  width: 18px;
  text-align: center;
  flex-shrink: 0;
}

.sidebar-footer {
  padding: 10px 20px;
  border-top: 1px solid #333;
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: #333;
  text-align: center;
}

/* ─── Mobile Menu Toggle ─── */
#menu-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 200;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  width: 40px;
  height: 40px;
  font-size: 1.4rem;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

/* ─── Main Content ─── */
#main {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: 32px 36px;
  min-height: 100vh;
}

.view-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 12px;
}

.view-header h2 {
  font-family: var(--font-display);
  font-size: 2.4rem;
  font-style: italic;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}

.view-header h2 i { color: var(--accent); margin-right: 4px; font-size: 1.2rem; }

.view-header-actions {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

/* ─── Cards ─── */
.card {
  background: var(--surface);
  border: 2px solid var(--border);
  padding: 0;
}

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 2px solid var(--border);
}

.card-header h3 {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 800;
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-header h3 i { color: var(--accent); }

.card > .info-row,
.card > .alert,
.card > .form-row,
.card > .form-group,
.card > p,
.card > .gap-row,
.card > .month-check-grid,
.card > .empty-state,
.card > .table-wrap,
.card > .payment-grid,
.card > h3 {
  margin-left: 18px;
  margin-right: 18px;
}

.card > .payment-grid { margin-bottom: 18px; }

.card > h3:first-child,
.card > .alert:first-child { margin-top: 18px; }

/* ─── Stat Cards (Dashboard) ─── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 0;
  margin-bottom: 28px;
  border: 2px solid var(--border);
}

.stat-card {
  background: var(--surface);
  border-right: 2px solid var(--border);
  padding: 28px 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: background var(--transition);
}

.stat-card:last-child { border-right: none; }
.stat-card:first-child { background: var(--primary); color: #fff; }
.stat-card:first-child h4 { color: #888; }
.stat-card:first-child .stat-value { color: #fff; }

.stat-card:hover { background: #f5f5f5; }
.stat-card:first-child:hover { background: #222; }

.stat-icon {
  font-size: 1.1rem;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.stat-icon.blue, .stat-icon.red, .stat-icon.green, .stat-icon.gold { background: none; }
.stat-icon i { color: var(--accent); font-size: 0.85rem; }

.stat-info h4 {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 400;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 8px;
}

.stat-info .stat-value {
  font-family: var(--font-display);
  font-size: 2.2rem;
  font-weight: 400;
  font-style: italic;
  color: var(--text);
  letter-spacing: -1px;
  line-height: 1;
}

.stat-info .stat-value.danger { color: var(--accent); }
.stat-info .stat-value.success { color: var(--success); }

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 18px;
  border: 2px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  text-decoration: none;
  white-space: nowrap;
  line-height: 1.4;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn:active {
  transform: none;
}

.btn-primary {
  background: var(--primary);
  color: #ffffff;
  border-color: var(--primary);
}
.btn-primary:hover {
  background: var(--accent);
  border-color: var(--accent);
}

.btn-success {
  background: var(--success);
  color: #ffffff;
  border-color: var(--success);
}
.btn-success:hover {
  background: #1e7e34;
  border-color: #1e7e34;
}

.btn-danger {
  background: var(--accent);
  color: #ffffff;
  border-color: var(--accent);
}
.btn-danger:hover {
  background: #cc2f26;
  border-color: #cc2f26;
}

.btn-warning {
  background: var(--warning);
  color: #ffffff;
  border-color: var(--warning);
}
.btn-warning:hover {
  background: #b8770e;
  border-color: #b8770e;
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text);
}
.btn-outline:hover {
  background: var(--primary);
  color: #fff;
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  padding: 6px 10px;
  border: none;
}
.btn-ghost:hover {
  background: none;
  color: var(--accent);
}

.btn-sm {
  padding: 5px 10px;
  font-size: 0.82rem;
}

.btn-lg {
  padding: 12px 24px;
  font-size: 1rem;
}

.btn-icon {
  padding: 6px;
  width: 32px;
  height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* ─── Forms ─── */
.form-group {
  margin-bottom: 16px;
}

.form-group label {
  display: block;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}

.form-group label .required {
  color: var(--danger);
  margin-left: 2px;
}

.form-control {
  width: 100%;
  padding: 9px 12px;
  border: 2px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.9rem;
  color: var(--text);
  background: #fff;
  transition: border-color var(--transition);
}

.form-control:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: none;
}

.form-control.error {
  border-color: var(--accent);
  box-shadow: none;
}

.form-error {
  color: var(--danger);
  font-size: 0.8rem;
  margin-top: 4px;
}

select.form-control {
  cursor: pointer;
}

textarea.form-control {
  resize: vertical;
  min-height: 60px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-row-3 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

/* ─── Tables ─── */
.table-wrap {
  overflow-x: auto;
  border: 2px solid var(--border);
  background: var(--surface);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}

thead th {
  background: var(--surface);
  padding: 9px 16px;
  text-align: left;
  font-family: var(--font-mono);
  font-size: 0.63rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 1;
}

thead th.text-right {
  text-align: right;
}

tbody td {
  padding: 11px 16px;
  border-bottom: 1px solid var(--border-light);
  vertical-align: middle;
  font-weight: 500;
}

tbody tr:hover {
  background: #f5f5f5;
}

tbody tr:last-child td {
  border-bottom: none;
}

td.text-right {
  text-align: right;
}

td.text-center {
  text-align: center;
}

/* ─── Badges ─── */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 700;
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border: 1px solid;
}

.badge-active {
  background: none;
  border-color: var(--success);
  color: var(--success);
}

.badge-inactive {
  background: none;
  border-color: var(--accent);
  color: var(--accent);
}

.badge-warning {
  background: none;
  border-color: var(--warning);
  color: var(--warning);
}

.badge-count {
  background: var(--danger);
  color: #fff;
  border-radius: 50%;
  min-width: 20px;
  height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
}

/* ─── Payment Grid ─── */
.payment-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 6px;
  margin: 16px 0;
}

.payment-month {
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  border: 2px solid var(--border);
  font-size: 0.78rem;
  font-weight: 700;
  position: relative;
}

.payment-month:hover {
  background: #f5f5f5;
}

.payment-month.paid {
  background: var(--success-light);
  color: var(--success);
  border-color: var(--success);
}

.payment-month.unpaid {
  background: var(--danger-light);
  color: var(--danger);
  border-color: var(--danger);
}

.payment-month.na {
  background: var(--bg);
  color: var(--text-light);
  cursor: default;
  border-color: var(--border);
}

.payment-month.inactive-month {
  background: #f0f0f0;
  color: #bbb;
  cursor: default;
  opacity: 0.4;
  border-color: #ddd;
}

.payment-month.inactive-month:hover {
  background: #f0f0f0;
}

.payment-month.na:hover {
  background: var(--bg);
}

.payment-month .month-label {
  display: block;
  font-size: 0.72rem;
  margin-bottom: 2px;
}

.payment-month .month-status {
  font-size: 1.1rem;
}

.payment-month .month-amount {
  display: block;
  font-size: 0.7rem;
  font-family: var(--font-mono);
  margin-top: 2px;
}

/* ─── Modals ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--surface);
  border: 2px solid var(--border);
  width: 100%;
  max-width: 650px;
  max-height: 90vh;
  overflow-y: auto;
  animation: modalIn 0.15s ease-out;
}

.modal-wide {
  max-width: 800px;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes modalShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 2px solid var(--border);
}

.modal-header h3 {
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 800;
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text);
}

.modal-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  transition: color var(--transition);
}

.modal-close:hover {
  color: var(--danger);
}

.modal-body {
  padding: 24px;
}

.modal-footer {
  padding: 14px 20px;
  border-top: 2px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}

/* ─── Tabs ─── */
.tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
  gap: 0;
}

.tab {
  padding: 10px 20px;
  cursor: pointer;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 0.78rem;
  color: var(--text-muted);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all var(--transition);
  white-space: nowrap;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.tab:hover {
  color: var(--text);
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 700;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* ─── Search & Toolbar ─── */
.toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.search-input {
  position: relative;
  flex: 1;
  min-width: 200px;
}

.search-input input {
  width: 100%;
  padding: 9px 12px 9px 36px;
  border: 2px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.9rem;
  background: #fff;
  transition: border-color var(--transition);
}

.search-input input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: none;
}

.search-input::before {
  content: '\f002';
  font-family: 'Font Awesome 7 Free';
  font-weight: 900;
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--text-muted);
  pointer-events: none;
}

.filter-select {
  padding: 9px 12px;
  border: 2px solid var(--border);
  font-family: var(--font-body);
  font-size: 0.9rem;
  background: #fff;
  cursor: pointer;
  min-width: 140px;
}

/* ─── Quick Actions ─── */
.quick-actions {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.quick-action-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 26px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-right: none;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.quick-action-btn:last-child { border-right: 2px solid var(--border); }

.quick-action-btn:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  transform: none;
  box-shadow: none;
}

.quick-action-btn:hover i { color: var(--accent); }

.quick-action-btn .qa-icon {
  font-size: 0.9rem;
}

/* ─── Empty State ─── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}

.empty-state .empty-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  display: block;
}

.empty-state h3 {
  font-family: var(--font-body);
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text);
}

.empty-state p {
  margin-bottom: 20px;
  font-size: 0.9rem;
}

/* ─── Member Detail ─── */
.member-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.info-row {
  display: flex;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.88rem;
}

.info-row:last-child {
  border-bottom: none;
}

.info-label {
  width: 140px;
  flex-shrink: 0;
  font-weight: 500;
  color: var(--text-muted);
}

.info-value {
  flex: 1;
  color: var(--text);
}

/* ─── Charts (CSS-only bar chart) ─── */
.chart-bar-container {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 200px;
  padding: 0 10px;
  margin: 20px 0;
}

.chart-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}

.chart-bar {
  width: 100%;
  max-width: 50px;
  background: var(--primary);
  min-height: 2px;
  transition: height 0.5s ease;
  position: relative;
}

.chart-bar-value {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-muted);
  margin-bottom: 4px;
  white-space: nowrap;
}

.chart-bar-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--text-muted);
  margin-top: 6px;
  font-weight: 700;
  text-transform: uppercase;
}

/* ─── Alerts ─── */
.alert {
  padding: 12px 16px;
  font-size: 0.84rem;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 2px solid;
}

.alert-warning {
  background: #fff;
  color: var(--warning);
  border-color: var(--warning);
}

.alert-danger {
  background: #fff;
  color: var(--accent);
  border-color: var(--accent);
}

.alert-success {
  background: #fff;
  color: var(--success);
  border-color: var(--success);
}

.alert-info {
  background: #fff;
  color: var(--primary);
  border-color: var(--primary);
}

/* ─── Toast notification ─── */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 12px 20px;
  background: var(--primary);
  color: #fff;
  font-size: 0.84rem;
  font-weight: 600;
  border: 2px solid var(--primary);
  animation: toastIn 0.2s ease-out, toastOut 0.2s ease-in 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
}

.toast.success { background: var(--success); border-color: var(--success); }
.toast.error { background: var(--accent); border-color: var(--accent); }
.toast.warning { background: var(--warning); border-color: var(--warning); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(40px); }
}

/* ─── Annual Grid ─── */
.annual-grid-wrap {
  overflow-x: auto;
}

.annual-grid-wrap table th,
.annual-grid-wrap table td {
  padding: 6px 8px;
  font-size: 0.8rem;
  text-align: center;
}

.annual-grid-wrap table th:first-child,
.annual-grid-wrap table td:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  background: inherit;
  z-index: 1;
}

.month-cell-paid {
  background: var(--success-light);
  color: var(--success);
  font-weight: 600;
}

.month-cell-unpaid {
  background: var(--danger-light);
  color: var(--danger);
  font-weight: 600;
}

.month-cell-na {
  color: var(--text-light);
}

/* ─── Settings sections ─── */
.settings-section {
  margin-bottom: 32px;
}

.settings-section h3 {
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--border);
}

/* ─── Confirm dialog ─── */
.confirm-body {
  text-align: center;
  padding: 20px;
}

.confirm-body .confirm-icon {
  font-size: 3rem;
  margin-bottom: 12px;
  display: block;
}

.confirm-body p {
  font-size: 1rem;
  margin-bottom: 8px;
}

.confirm-body .confirm-warning {
  color: var(--danger);
  font-size: 0.88rem;
}

/* ─── Print Styles ─── */
@media print {
  #sidebar, .no-print, #menu-toggle, .toast-container, .modal-overlay {
    display: none !important;
  }
  #main {
    margin-left: 0 !important;
    padding: 10px !important;
  }
  body {
    font-size: 11pt;
    background: #fff;
  }
  .card {
    box-shadow: none;
    border: 2px solid #333;
    break-inside: avoid;
  }
  table {
    font-size: 9pt;
    border-collapse: collapse;
  }
  thead th {
    background: #eee !important;
  }
  td, th {
    border: 1px solid #333 !important;
  }
  .btn { display: none !important; }
  .stat-card { break-inside: avoid; }
  .stats-grid { border: 2px solid #333; }
  .stat-card { border-right: 2px solid #333; }
}

/* ─── Responsive ─── */
@media (max-width: 900px) {
  #sidebar {
    transform: translateX(-100%);
  }
  #sidebar.open {
    transform: translateX(0);
  }
  #menu-toggle {
    display: flex;
  }
  #main {
    margin-left: 0;
    padding: 20px 16px;
    padding-top: 60px;
  }
  .member-detail-grid {
    grid-template-columns: 1fr;
  }
  .form-row {
    grid-template-columns: 1fr;
  }
  .form-row-3 {
    grid-template-columns: 1fr;
  }
  .stats-grid {
    grid-template-columns: 1fr 1fr;
  }
  .payment-grid {
    grid-template-columns: repeat(6, 1fr);
  }
}

@media (max-width: 500px) {
  .stats-grid {
    grid-template-columns: 1fr;
  }
  .payment-grid {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #ddd; }
::-webkit-scrollbar-thumb:hover { background: #999; }

/* ─── Multi-month checkbox selector ─── */
.month-check-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin: 12px 0;
}

.month-check-label {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border: 2px solid var(--border);
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all var(--transition);
}

.month-check-label:hover {
  background: #f5f5f5;
}

.month-check-label input:checked + span {
  font-weight: 700;
  color: var(--accent);
}

.month-check-label.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  background: var(--bg);
}
.month-check-label.month-inactive {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ─── Year selector ─── */
.year-selector {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.year-selector button {
  background: var(--surface);
  border: 2px solid var(--border);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1rem;
  transition: all var(--transition);
}

.year-selector button:hover {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

.year-selector .year-display {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 600;
  min-width: 60px;
  text-align: center;
}

/* ─── SubTab styling for payments ─── */
.sub-tabs {
  display: flex;
  gap: 0;
  border: 2px solid var(--border);
  margin-bottom: 20px;
}

.sub-tab {
  padding: 10px 20px;
  font-family: var(--font-body);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all var(--transition);
  background: none;
  border: none;
  border-right: 2px solid var(--border);
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sub-tab:last-child { border-right: none; }

.sub-tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: none;
  font-weight: 700;
}

.sub-tab:hover:not(.active) {
  background: #f5f5f5;
  color: var(--text);
}

/* ─── Clickable row ─── */
tr.clickable-row {
  cursor: pointer;
}
tr.clickable-row:hover {
  background: #eef3f9 !important;
}

/* ─── File Status Indicator ─── */
.file-status {
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all var(--transition);
  border-top: 1px solid #333;
}

.file-status:hover {
  background: rgba(255,255,255,0.03);
}

.file-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.file-status-dot.connected {
  background: #4ade80;
  box-shadow: none;
}

.file-status-dot.disconnected {
  background: var(--accent);
  box-shadow: none;
}

.file-status-text {
  color: #555;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-status-text strong {
  color: #999;
  display: block;
  font-size: 0.7rem;
}

/* ─── Startup / Welcome Screen ─── */
.welcome-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
}

.welcome-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  padding: 48px;
  max-width: 550px;
  width: 100%;
  text-align: center;
}

.welcome-card .welcome-icon {
  font-size: 3.5rem;
  margin-bottom: 16px;
  display: block;
}

.welcome-card h2 {
  color: var(--primary);
  margin-bottom: 8px;
}

.welcome-card p {
  color: var(--text-muted);
  margin-bottom: 24px;
  font-size: 0.92rem;
  line-height: 1.6;
}

.welcome-actions {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.welcome-action-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 24px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  font-size: 0.95rem;
  text-align: left;
  color: var(--text);
}

.welcome-action-btn:hover {
  border-color: var(--primary-light);
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.welcome-action-btn .wab-icon {
  font-size: 1.8rem;
  flex-shrink: 0;
}

.welcome-action-btn .wab-text strong {
  display: block;
  margin-bottom: 2px;
  color: var(--primary);
}

.welcome-action-btn .wab-text span {
  font-size: 0.82rem;
  color: var(--text-muted);
}

.welcome-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 0.82rem;
  margin: 4px 0;
}

.welcome-divider::before,
.welcome-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── Receipt Print Styles ─── */
.receipt-print-area {
  display: none;
}

@media print {
  .receipt-print-area {
    display: block !important;
  }
}

.receipt {
  border: 2px solid var(--primary);
  border-radius: var(--radius);
  padding: 32px;
  max-width: 500px;
  margin: 0 auto;
  font-family: var(--font-body);
  background: #fff;
}

.receipt-header {
  text-align: center;
  border-bottom: 2px solid var(--primary);
  padding-bottom: 16px;
  margin-bottom: 20px;
}

.receipt-header .receipt-club {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}

.receipt-header .receipt-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.receipt-number {
  text-align: right;
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 16px;
}

.receipt-body .receipt-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.92rem;
}

.receipt-body .receipt-row:last-child {
  border-bottom: none;
}

.receipt-body .receipt-label {
  color: var(--text-muted);
  font-weight: 500;
}

.receipt-body .receipt-val {
  font-weight: 600;
  color: var(--text);
}

.receipt-body .receipt-val.amount {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--success);
}

.receipt-footer {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 2px solid var(--primary);
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.receipt-footer .receipt-stamp {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}

.receipt-footer .receipt-stamp .stamp-line {
  display: block;
  width: 140px;
  border-top: 1px solid var(--text);
  margin-top: 40px;
  padding-top: 4px;
}

.receipt-cancelled {
  opacity: 0.7;
  position: relative;
}
.receipt-cancelled .receipt-body .receipt-val {
  text-decoration: line-through;
}
.receipt-cancel-stamp {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 4rem;
  font-weight: 900;
  color: rgba(192, 57, 43, 0.3);
  letter-spacing: 8px;
  pointer-events: none;
  z-index: 1;
}

.receipt-badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--accent);
  background: none;
  border-bottom: 2px solid var(--accent);
  padding-bottom: 1px;
  white-space: nowrap;
}

.autosave-indicator {
  position: fixed;
  bottom: 16px;
  right: 16px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  z-index: 500;
  pointer-events: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s, transform 0.3s;
}

.autosave-indicator.show {
  opacity: 1;
  transform: translateY(0);
}

.autosave-indicator.saving {
  background: var(--warning-light);
  color: var(--warning);
}

.autosave-indicator.saved {
  background: var(--success-light);
  color: var(--success);
}

.autosave-indicator.error {
  background: var(--danger-light);
  color: var(--danger);
}

/* ─── Misc Utilities ─── */
.text-muted { color: var(--text-muted); }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.text-right { text-align: right; }
.text-center { text-align: center; }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mt-3 { margin-top: 24px; }
.mb-1 { margin-bottom: 8px; }
.mb-2 { margin-bottom: 16px; }
.mb-3 { margin-bottom: 24px; }
.fw-600 { font-weight: 600; }
.gap-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }

.member-search-result {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background var(--transition);
}
.member-search-result:hover {
  background: var(--bg);
}
.member-search-result .msr-name {
  font-weight: 600;
}
.member-search-result .msr-child {
  font-size: 0.82rem;
  color: var(--text-muted);
}

.member-search-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  max-height: 200px;
  overflow-y: auto;
  z-index: 10;
  display: none;
}

.member-search-dropdown.show {
  display: block;
}

/* Category row actions */
.cat-actions {
  display: flex;
  gap: 4px;
}

  </style>
